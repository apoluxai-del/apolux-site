<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1525"/>
      <stop offset="100%" stop-color="#080E1C"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Outer ring (gold) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#F0C040" stroke-width="1.5" opacity="0.6"/>

  <!-- Middle ring (blue) -->
  <circle cx="100" cy="100" r="58" fill="none" stroke="#3B6AFF" stroke-width="1" opacity="0.5"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="36" fill="none" stroke="#5C87FF" stroke-width="0.8" opacity="0.4"/>

  <!-- Top dot on outer ring (gold) -->
  <circle cx="100" cy="20" r="4" fill="#F0C040"/>

  <!-- Right dot on middle ring (blue) -->
  <circle cx="158" cy="100" r="3" fill="#3B6AFF"/>

  <!-- Bottom-left dot on outer ring -->
  <circle cx="43" cy="143" r="2.5" fill="#F0C040" opacity="0.5"/>

  <!-- 4 cross lines (compass style, gold) -->
  <line x1="100" y1="64" x2="100" y2="40" stroke="#F0C040" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="136" x2="100" y2="160" stroke="#F0C040" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="100" x2="40" y2="100" stroke="#F0C040" stroke-width="1" opacity="0.4"/>
  <line x1="136" y1="100" x2="160" y2="100" stroke="#F0C040" stroke-width="1" opacity="0.4"/>

  <!-- Center circle (filled blue glow) -->
  <circle cx="100" cy="100" r="20" fill="#0D1525" stroke="#3B6AFF" stroke-width="1.5"/>

  <!-- Center dot (gold) -->
  <circle cx="100" cy="100" r="7" fill="#F0C040"/>
</svg>
